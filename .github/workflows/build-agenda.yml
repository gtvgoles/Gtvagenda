name: Generar agenda.json

on:
  workflow_dispatch:
    inputs:
      force_commit:
        description: "Forzar commit aunque no cambie agenda.json"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: '7 3 * * *'
      timezone: 'America/Santiago'

permissions:
  contents: write

concurrency:
  group: agenda-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Build agenda.json
        run: python scripts/build_agenda.py

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agenda.json .cache data/manual_sofa.json
          if git diff --cached --quiet; then
            if [[ "${{ inputs.force_commit }}" == "true" ]]; then
              git commit --allow-empty -m "Forzar actualización de agenda"
              git push
            else
              echo "Sin cambios para commit"
            fi
          else
            git commit -m "Actualizar agenda.json"
            git push
          fi
